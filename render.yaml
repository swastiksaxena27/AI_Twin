services:
  # Backend — FastAPI, deployed as a Render Web Service.
  # NOTE (free tier): spins down after 15 min idle; the first request after
  # that takes ~30-50s to wake back up. Fine for testing/demoing, not for a
  # real always-on product — upgrade the plan when that matters.
  - type: web
    name: ai-behavioral-guardian-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn behavioral_guardian.backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: BEHAVIORAL_GUARDIAN_JWT_SECRET
        generateValue: true  # Render generates a real random secret for you
      - key: PYTHON_VERSION
        value: "3.12.3"

  # Frontend — React/Vite, deployed as a Render Static Site (genuinely free,
  # no cold-start sleep — unlike the backend above).
  - type: web
    name: ai-behavioral-guardian-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      # Fill this in with your backend's actual Render URL once it's live —
      # e.g. https://ai-behavioral-guardian-backend.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
